<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

    <title>Maze 3D Explorer</title>
    <meta name="description" content="A fast-paced 3D maze runner — collect gems, cycle themes, beat 10,000!" />

    <!-- PWA / Install -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Maze" />
    <meta name="theme-color" content="#00FF88" />
    <meta name="msapplication-TileColor" content="#0A0E1A" />

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/images/pwa-icon-192.png" />
    <link rel="apple-touch-icon" href="/assets/images/pwa-icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/assets/images/pwa-icon-512.png" />

    <!-- Splash / full-screen styling -->
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #0A0E1A; }
    </style>
  </head>
  <body>
    <noscript>Enable JavaScript to play Maze 3D Explorer.</noscript>
    <div id="root"></div>

    <!-- Service Worker registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/sw.js').catch(function(err) {
            console.warn('SW registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
