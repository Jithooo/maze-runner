kind = "mobile"
previewPath = "/"
title = "3D Maze Game"
version = "1.0.0"
id = "artifacts/maze-game"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
localPort = 21040
name = "expo"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/maze-game run dev"

[services.env]
PORT = "21040"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/maze-game", "run", "build"]
run = ["pnpm", "--filter", "@workspace/maze-game", "run", "serve"]
